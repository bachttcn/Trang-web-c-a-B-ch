// ===== PROCESS =====
function process(){
    let base = document.getElementById("input").value;

    base = base.replace("C6%","C5%");
    let pos = base.indexOf("3Acom.");

    if(pos === -1){
        alert("Token sai");
        return;
    }

    base = base.substring(0,pos+6);

    let html = "";

    for(let k in TOKENS){
        let full = base + TOKENS[k];

        html += `
        <div class="box" id="box_${k}">
            <b>${k}</b>
            <textarea id="t_${k}">${full}</textarea>
            <br>
            <button onclick="runOne('${k}')">Run ${k}</button>
        </div>`;
    }

    document.getElementById("out").innerHTML = html;
}

// ===== RUN 1 =====
function runOne(k){
    let el = document.getElementById("t_"+k);
    if(!el) return;

    window.open(el.value,"_blank");
}

// ===== STEALTH =====
async function runStealth(){
    running = true;

    let min = parseInt(document.getElementById("dmin").value);
    let max = parseInt(document.getElementById("dmax").value);
    let limit = parseInt(document.getElementById("limit").value);

    let count = 0;

    for(let k in TOKENS){
        if(!running) break;

        let el = document.getElementById("t_"+k);
        if(!el) continue;

        window.open(el.value,"_blank");
        count++;

        if(count >= limit) break;

        await sleep(Math.random()*(max-min)+min);
    }
}

function stopRun(){ running = false; }

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function clearAll(){
    document.getElementById("input").value="";
    document.getElementById("out").innerHTML="";
}
