<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACH TOKEN PRO - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --primary: #f59e0b;
            --secondary: #ef4444;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.08) 0px, transparent 50%);
            color: #f1f5f9;
            min-height: 100vh;
        }

        .mono { font-family: 'Fira Code', monospace; }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neo-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.3);
        }

        .token-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .token-card:hover {
            border-color: rgba(245, 158, 11, 0.3);
            background: rgba(15, 23, 42, 0.9);
            transform: translateY(-4px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-16 text-center relative">
            <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-48 h-48 bg-orange-500/10 blur-[80px] rounded-full"></div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-orange-400 via-amber-500 to-rose-500">
                    BACH TOKEN PRO
                </span>
            </h1>
            <p class="text-slate-500 font-medium tracking-[0.2em] uppercase text-xs">Hệ thống xử lý Token cao cấp • Phiên bản tối ưu</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- Left Side: Input & Control -->
            <div class="lg:col-span-4 space-y-8">
                <section class="glass rounded-[2rem] p-8">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-orange-500/10 rounded-xl text-orange-500">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                            </div>
                            <h2 class="text-lg font-bold tracking-tight">Dữ liệu nguồn</h2>
                        </div>
                        <!-- Nút Xóa nhanh ô nhập -->
                        <button 
                            onclick="clearInputOnly()" 
                            class="text-[10px] font-bold text-rose-500 hover:text-rose-400 uppercase tracking-widest transition-colors flex items-center gap-1 group"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:rotate-90 transition-transform"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                            Xóa
                        </button>
                    </div>
                    
                    <textarea 
                        id="input" 
                        rows="10" 
                        class="w-full bg-slate-950/40 border border-slate-800/50 rounded-2xl p-5 text-orange-400 mono text-sm focus:ring-2 focus:ring-orange-500/30 focus:border-orange-500 outline-none transition-all placeholder-slate-700 resize-none"
                        placeholder="Dán mã Token hoặc URL nguồn vào đây..."
                    ></textarea>

                    <div class="grid grid-cols-1 gap-4 mt-8">
                        <button 
                            onclick="process()" 
                            class="neo-btn w-full bg-gradient-to-br from-orange-500 to-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98]"
                        >
                            XỬ LÝ DỮ LIỆU
                        </button>
                        <button 
                            onclick="clearAll()" 
                            class="w-full bg-slate-800/30 hover:bg-slate-800/60 text-slate-400 font-semibold py-3 rounded-2xl transition-all"
                        >
                            LÀM MỚI TẤT CẢ
                        </button>
                    </div>
                    
                    <div id="error-box" class="hidden mt-6 p-4 bg-red-500/5 border border-red-500/10 text-red-400 rounded-xl text-xs flex items-start gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mt-0.5"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                        <span id="error-msg" class="leading-relaxed"></span>
                    </div>
                </section>

                <!-- Status Panel -->
                <div class="glass rounded-[2rem] p-8 hidden lg:block">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Trạng thái hệ thống</h3>
                    <div class="flex items-center gap-3 text-sm font-medium">
                        <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span>
                        <span class="text-slate-300">Sẵn sàng xử lý</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Dynamic Results -->
            <div class="lg:col-span-8">
                <div id="out" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Placeholder State -->
                    <div id="empty-state" class="col-span-full py-32 text-center glass rounded-[2.5rem] border-dashed border-2 border-slate-800/50">
                        <div class="opacity-10 mb-6 flex justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                        </div>
                        <p class="text-slate-600 font-semibold text-lg tracking-tight">Chưa có kết quả xử lý</p>
                        <p class="text-slate-700 text-sm mt-2">Vui lòng nhập token nguồn để bắt đầu</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-24 py-10 border-t border-slate-900/50 text-center">
            <p class="text-slate-600 text-[10px] font-bold tracking-[0.4em] uppercase">
                &copy; 2026 • TRỊNH TOÀN BÁCH • PREMIUM TOKEN SOLUTION
            </p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-12 right-12 flex items-center gap-4 bg-orange-600 text-white px-8 py-5 rounded-2xl shadow-2xl transition-all duration-500 opacity-0 translate-y-12 pointer-events-none z-50">
        <div class="bg-white/20 p-1.5 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="font-bold tracking-tight">Đã sao chép liên kết!</span>
    </div>

    <script>

        const TOKENS = {
            "AI 12 Tháng": "google.android.apps.subscriptions.red%3Ag1.2tb.ai.12months_eft.3%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22ASivciaXb4TgcwIgqy%2BwbtHXYErDG6sNNHck8L0AAknyM1RUpDkpk10P8LiwJ8ZJHLHOSbrYYjoVijIZOL4FaPt8lSZUF5Je6OlR%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRgIhAIUBrzA4w3jbTfWA8uBOtW0mneC4TGM1MG36rcSPTHcAAiEA8R38e6cGHqva5j%2BkzJOCY5U6QwO%2F626nBHf76Mdomvk%3D%22%2C%5B1769410607%2C873451000%5D%2C%22f291a043-4af9-40df-88bd-6b6f17fd5c64%22%5D%5D",
            "AI 04 Tháng": "google.android.apps.subscriptions.red%3Ag1.2tb.ai.4months_eft%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22ASivcia3kkQHb%2FnIV42r8Nnf7fdXHcUCtsOuohpC2EnogFpcg5R6K7zluONcxJiPoBkoOzOP62BQL6uyHrsSlHUi%2BRuZN6Gf8wdyF0Vjj0g%3D%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRgIhAPzocCAKFtoUWZZE5rVokCqFQpa7EOA3%2BBrihKs6JNqrAiEAghe6Acc8%2FJu52nHrJ2%2BK0yfq7y0X%2BIHKo8%2BgKHOARmo%3D%22%2C%5B1769410196%2C809292000%5D%2C%22a35d2f5c-9360-4e4e-9b07-387a9634954c%22%5D%5D",
            "AI 01 Tháng": "google.android.apps.subscriptions.red%3Ag1.2tb.ai.1month_eft%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22ASivcibg%2BL4lopIKmxGRVoY0hny8tPU%2F2boCCkwfLZ8PD8NQFNphiY0ah49oSttaHCLY6zQoVCRQhp9aNy7WCX8%2FpC%2FOb%2BEnbyma5jpdcTM%3D%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRQIhAOStagOxzrKPlpFm%2BCGux5Air5qdXeyMk2XFwnI6oz6TAiBL4cLYKTnKZz1B%2BQ3hMVnhomftRQSSO4yi2NipdU%2BISg%3D%3D%22%2C%5B1769410127%2C71712000%5D%2C%2222cac307-b794-4d57-b0ce-1b14fa43bd69%22%5D%5D",
            "Gói Ultra": "google.android.apps.subscriptions.red%3Ag1.ai.pro.3months_ip_50p%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22AdummIv6rSkTRUh1Gbm9TvZk4lZvKSGdibiw2GWYphMuVPewFTRXBADM9H8RXAsJz07U9ycuCyllzdPwVm%2B8qs4Fvbb081FlqLGjUN8x0Q%3D%3D%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRQIgCC%2FBdaimjvwUixBOiZKBwBpulODgncZR75%2FhL%2BVeyM0CIQCC68%2BrhJJY5aw%2BMS%2F3%2FH0gYbg8YWIMZKKEisQJM00kKg%3D%3D%22%2C%5B1776750495%2C622106000%5D%2C%225578bc6c-e5a8-4f6e-8231-3ce9ca0527db%22%5D%5D",
            "Lưu trữ 10TB": "google.android.apps.subscriptions.red%3Ag1.10tb%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22AdummIsz0TjjKYLi4Z2S3q%2FAaptiPITdO0%2F5w4QH8ZX1%2FYNNhkLU5TBEF%2B05ymOaWjLaNDgd5w%3D%3D%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRgIhAOzyIGIPHFf6mk1jted3U95A%2Fy6UZ9sjK%2FvB0vlxAeuLAiEAkyAlO7EnGo7Jl2HkVlJl4fZbwB0CjNR2TV10mAGeJQU%3D%3D%22%2C%5B1776966813%2C774578000%5D%2C%229921e649-b052-468f-a982-b91cb7bf476d%22%5D%5D",
            "Lưu trữ 20TB": "google.android.apps.subscriptions.red%3Ag1.20tb%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22AdummIsz0TjjKYLi4Z2S3q%2FAaptiPITdO0%2F5w4QH8ZX1%2FYNNhkLU5TBEF%2B05ymOaWjLaNDgd5w%3D%3D%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRQIhAK8msG6cV%2B2WCNjexF%2Be2WjeAbPjYrRuLZZaiMefEsyNAiA9zxcgmnHruXzgt86OzhAOFe7A4CTTzZVWwqiVZ%2BasSg%3D%3D%22%2C%5B1776966863%2C306401000%5D%2C%2233ab84a4-ea84-462c-841f-06457880b282%22%5D%5D",
            "Lưu trữ 30TB": "google.android.apps.subscriptions.red%3Ag1.30tb%22%2C21%5D%2Cnull%2Cnull%2Cnull%2C1%2C%5B%22AdummIsz0TjjKYLi4Z2S3q%2FAaptiPITdO0%2F5w4QH8ZX1%2FYNNhkLU5TBEF%2B05ymOaWjLaNDgd5w%3D%3D%22%5D%5D%5D%5D%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2C1%2Cnull%2Cnull%2C%5Bnull%2C%22AXYi0qwwRQIhAJigiB3bzCh1PnYaPLmaPfE5Y0mVVKZlc9JmHyLUBWsFAiBy3bPBGxY%2BcpDDf7LsxTnqOoQcrSED9UMiaHcRvSS%2F2g%3D%3D%22%2C%5B1776966909%2C686734000%5D%2C%227c6928a0-207e-48d1-953d-c36d67160783%22%5D%5D"
        };

        function showError(msg) {
            const errBox = document.getElementById("error-box");
            if(msg) {
                document.getElementById("error-msg").innerText = msg;
                errBox.classList.remove("hidden");
            } else {
                errBox.classList.add("hidden");
            }
        }

        function notify() {
            const toast = document.getElementById("toast");
            toast.classList.remove("opacity-0", "translate-y-12", "pointer-events-none");
            setTimeout(() => {
                toast.classList.add("opacity-0", "translate-y-12", "pointer-events-none");
            }, 3000);
        }

        async function copyToClipboard(id) {
            const text = document.getElementById(id).value;
            try {
                const temp = document.createElement("textarea");
                temp.value = text;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                notify();
            } catch (err) {
                console.error("Lỗi:", err);
            }
        }

        function process() {
            let base = document.getElementById("input").value.trim();
            showError(null);

            if (!base) {
                showError("Vui lòng nhập dữ liệu token nguồn.");
                return;
            }

            base = base.replace(/2C6/g, "2C5");
            let pos = base.indexOf("3Acom.");
            if (pos === -1) {
                showError("Dữ liệu không hợp lệ. Vui lòng dán toàn bộ URL hoặc mã chứa '3Acom.'");
                return;
            }

            const prefix = base.substring(0, pos + 6);
            let html = "";
            let count = 0;

            for (let label in TOKENS) {
                const finalToken = prefix + TOKENS[label] + SUFFIX;
                const safeId = `t_${count++}`;

                html += `
                <div class="token-card glass rounded-[2rem] p-7 flex flex-col h-full overflow-hidden">
                    <div class="flex items-center justify-between mb-5">
                        <div class="flex items-center gap-3">
                            <div class="w-1.5 h-6 bg-orange-500 rounded-full shadow-[0_0_12px_rgba(245,158,11,0.4)]"></div>
                            <h3 class="font-extrabold text-white text-lg tracking-tight">${label}</h3>
                        </div>
                        <span class="text-[9px] bg-orange-500/10 text-orange-500 px-2.5 py-1 rounded-full font-bold tracking-widest uppercase">Active</span>
                    </div>
                    
                    <textarea 
                        id="${safeId}" 
                        readonly 
                        class="flex-grow bg-slate-950/60 border border-slate-800/60 rounded-2xl p-4 text-[10px] mono text-slate-500 mb-6 h-32 resize-none focus:outline-none focus:border-orange-500/40 transition-colors scrollbar-hide"
                    >${finalToken}</textarea>

                    <div class="flex gap-2">
                        <button 
                            onclick="copyToClipboard('${safeId}')" 
                            class="flex-1 bg-white hover:bg-slate-100 text-slate-950 font-bold py-3.5 rounded-xl transition-all active:scale-[0.96] flex items-center justify-center gap-2 text-xs"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                            SAO CHÉP
                        </button>
                        <button 
                            onclick="window.open('${finalToken}', '_blank')" 
                            class="p-3.5 bg-orange-500/10 hover:bg-orange-500 text-orange-500 hover:text-white rounded-xl transition-all active:scale-[0.96]"
                            title="Mở ngay"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
                        </button>
                    </div>
                </div>`;
            }

            const out = document.getElementById("out");
            out.innerHTML = html;
        }

        function clearInputOnly() {
            document.getElementById("input").value = "";
            showError(null);
        }

        function clearAll() {
            document.getElementById("input").value = "";
            document.getElementById("out").innerHTML = `
                <div id="empty-state" class="col-span-full py-32 text-center glass rounded-[2.5rem] border-dashed border-2 border-slate-800/50">
                    <div class="opacity-10 mb-6 flex justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    </div>
                    <p class="text-slate-600 font-semibold text-lg tracking-tight">Chưa có kết quả xử lý</p>
                    <p class="text-slate-700 text-sm mt-2">Vui lòng nhập token nguồn để bắt đầu</p>
                </div>`;
            showError(null);
        }
    </script>
</body>
</html>
