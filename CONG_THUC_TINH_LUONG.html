<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính lương giáo viên</title>

<style>
body{
    font-family: Arial;
    padding: 20px;
}

input{
    margin: 5px;
    padding: 6px;
    width: 160px;
}

.box{
    border: 1px solid #ccc;
    padding: 20px;
    margin-top: 15px;
}

h2{
    color: #2c3e50;
}

button{
    padding: 8px 15px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>TÍNH LƯƠNG GIÁO VIÊN</h2>

Hệ số lương:
<input id="hs" value="4.68" placeholder="Ví dụ: 4.68 hoặc 4,68"><br>

Lương cơ sở:
<input id="lcs" value="2340000" placeholder="Ví dụ: 2340000"><br>

Hệ số chức vụ:
<input id="hs_cv" placeholder="Ví dụ: 0.15 hoặc 0,15"><br>

Ưu đãi (%):
<input id="ud" placeholder="Ví dụ: 30"><br>

Thâm niên nghề (%):
<input id="tn" placeholder="Ví dụ: 22"><br>

<button onclick="tinh()">Tính lương</button>

<div class="box" id="kq"></div>

<script>

// Hàm đọc số: chấp nhận cả dấu chấm và dấu phẩy
function so(id){
    let value = document.getElementById(id).value.trim();

    if(value === ""){
        return 0;
    }

    // Đổi dấu phẩy thành dấu chấm
    value = value.replace(",", ".");

    let number = parseFloat(value);

    if(isNaN(number)){
        return 0;
    }

    return number;
}

// Hàm đọc lương cơ sở
function tien(id){
    let value = document.getElementById(id).value.trim();

    if(value === ""){
        return 0;
    }

    // Xóa dấu cách
    value = value.replace(/\s/g, "");

    // Nếu nhập 2.340.000 hoặc 2,340,000 thì xóa dấu ngăn cách
    value = value.replace(/[.,]/g, "");

    let number = parseFloat(value);

    if(isNaN(number)){
        return 0;
    }

    return number;
}

function tinh(){

    let hs = so("hs");
    let lcs = tien("lcs");
    let hs_cv = so("hs_cv");

    // Nhập 30 sẽ hiểu là 30%
    // Nhập 22 sẽ hiểu là 22%
    let ud = so("ud") / 100;
    let tn = so("tn") / 100;

    // ===== 1. Lương hệ số =====
    let luong = hs * lcs;

    // ===== 2. Phụ cấp chức vụ =====
    let pc_cv = hs_cv * lcs;

    // ===== 3. Thâm niên nghề =====
    let tn_nghe = (luong + pc_cv) * tn;

    // ===== 4. Phụ cấp ưu đãi =====
    let uu_dai = (luong + pc_cv) * ud;

    // ===== 5. Tổng thu nhập =====
    let tong = luong + pc_cv + tn_nghe + uu_dai;

    // ===== 6. Lương đóng bảo hiểm =====
    let luong_bh = luong + pc_cv + tn_nghe;

    // ===== 7. Các khoản trừ =====
    let bhxh = luong_bh * 0.08;
    let bhyt = luong_bh * 0.015;
    let bhtn = luong_bh * 0.01;

    // ===== 8. Thực lãnh =====
    let thuc_lanh = tong - (bhxh + bhyt + bhtn);

    // ===== Hiển thị kết quả =====
    document.getElementById("kq").innerHTML = `
        <h3 style="margin-top:0">LƯƠNG CHI TIẾT</h3>

        Lương hệ số: ${luong.toLocaleString("vi-VN")} đ<br>
        Phụ cấp chức vụ: ${pc_cv.toLocaleString("vi-VN")} đ<br>
        Thâm niên nghề: ${tn_nghe.toLocaleString("vi-VN")} đ<br>
        Phụ cấp ưu đãi: ${uu_dai.toLocaleString("vi-VN")} đ<br>

        <hr>

        <b>Tổng thu nhập:</b> ${tong.toLocaleString("vi-VN")} đ<br><br>

        <b>CÁC KHOẢN TRỪ</b><br>
        BHXH (8%): ${bhxh.toLocaleString("vi-VN")} đ<br>
        BHYT (1.5%): ${bhyt.toLocaleString("vi-VN")} đ<br>
        BHTN (1%): ${bhtn.toLocaleString("vi-VN")} đ<br>

        <hr>

        <b style="color:green;font-size:28px">
        THỰC LÃNH: ${thuc_lanh.toLocaleString("vi-VN")} đ
        </b>
    `;
}

</script>

</body>
</html>
