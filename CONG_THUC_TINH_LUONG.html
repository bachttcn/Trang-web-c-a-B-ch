<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tính lương giáo viên</title>

<style>
body{font-family:Arial;padding:20px}
input{margin:5px;padding:5px;width:120px}
.box{border:1px solid #ccc;padding:15px;margin-top:10px}
h2{color:#2c3e50}
</style>

</head>

<body>

<h2>TÍNH LƯƠNG GIÁO VIÊN</h2>

Hệ số lương: <input id="hs" value="4.68"><br>
Lương cơ sở: <input id="lcs" value="2340000"><br>
Hệ số chức vụ: <input id="hs_cv" value="0.15"><br>
Ưu đãi (%): <input id="ud" value="0.3"><br>
Thâm niên nghề (%): <input id="tn" value="0.21"><br>

<button onclick="tinh()">Tính lương</button>

<div class="box" id="kq"></div>

<script>

function tinh(){

let hs = parseFloat(document.getElementById("hs").value);
let lcs = parseFloat(document.getElementById("lcs").value);
let hs_cv = parseFloat(document.getElementById("hs_cv").value);
let ud = parseFloat(document.getElementById("ud").value);
let tn = parseFloat(document.getElementById("tn").value);

// ===== 1. Lương =====
let luong = hs * lcs;

// ===== 2. Phụ cấp chức vụ =====
let pc_cv = hs_cv * lcs;

// ===== 3. Thâm niên nghề (có chức vụ) =====
let tn_nghe = (luong + pc_cv) * tn;

// ===== 4. PHỤ CẤP ƯU ĐÃI (ĐÃ CỘNG CHỨC VỤ) =====
let uu_dai = (luong + pc_cv) * ud;

// ===== 5. Tổng =====
let tong = luong + pc_cv + tn_nghe + uu_dai;

// ===== 6. Lương bảo hiểm =====
let luong_bh = luong + pc_cv + tn_nghe;

// ===== 7. Khấu trừ =====
let bhxh = luong_bh * 0.08;
let bhyt = luong_bh * 0.015;
let bhtn = luong_bh * 0.01;

// ===== 8. Thực lãnh =====
let thuc_lanh = tong - (bhxh + bhyt + bhtn);

// ===== UI =====
document.getElementById("kq").innerHTML = `
<b>LƯƠNG CHI TIẾT</b><br><br>

Lương hệ số: ${luong.toLocaleString()} đ<br>
Phụ cấp chức vụ: ${pc_cv.toLocaleString()} đ<br>
Thâm niên nghề: ${tn_nghe.toLocaleString()} đ<br>
Phụ cấp ưu đãi: ${uu_dai.toLocaleString()} đ<br>

<hr>

<b>Tổng thu nhập:</b> ${tong.toLocaleString()} đ<br><br>

<b>CÁC KHOẢN TRỪ</b><br>
BHXH (8%): ${bhxh.toLocaleString()} đ<br>
BHYT (1.5%): ${bhyt.toLocaleString()} đ<br>
BHTN (1%): ${bhtn.toLocaleString()} đ<br>

<hr>

<b style="color:green;font-size:18px">
THỰC LÃNH: ${thuc_lanh.toLocaleString()} đ
</b>
`;
}

</script>

</body>
</html>
