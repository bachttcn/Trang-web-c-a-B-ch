<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trịnh Toàn Bách - Thông tin liên hệ</title>
    <!-- Sử dụng Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            
            /* Brand Colors */
            --color-facebook: #1877F2;
            --color-zalo: #0068FF;
            --color-tiktok: #000000;
            --color-email: #EA4335;
            --color-website: #10B981;
            --color-google: #FF5722;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng trang trí phía trên card */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, #ff5722, #764ba2, #667eea);
        }

        .avatar-container {
            margin-bottom: 20px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.2);
            background: #f3f4f6;
        }

        .info-section h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
            /* Đổ màu chữ gradient cho tên */
            background: linear-gradient(to right, #764ba2, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-section h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4b5563;
            line-height: 1.4;
        }

        .tags {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag-item {
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            filter: brightness(1.1);
        }

        /* Màu riêng cho từng nút */
        .btn-facebook { background-color: var(--color-facebook); }
        .btn-zalo { background-color: var(--color-zalo); }
        .btn-tiktok { background-color: var(--color-tiktok); }
        .btn-email { background-color: var(--color-email); }
        .btn-website { background-color: var(--color-website); }
        .btn-orange { 
            background-color: var(--color-google);
            margin-top: 8px;
            border-radius: 50px; /* Nút tool bo tròn hơn */
        }

        .footer-info {
            margin-top: 30px;
            font-size: 12px;
            color: #6b7280;
            background: #f9fafb;
            padding: 20px;
            border-radius: 20px;
            line-height: 1.8;
        }

        .footer-info strong { color: #374151; }

        /* Modal / Popup */
        #toolPopup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 950px;
            height: 85vh;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .modal-header {
            padding: 15px 25px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #closeTool {
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            flex: 1;
            border: none;
        }

        @media (max-width: 480px) {
            .card { padding: 35px 20px; }
            .info-section h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-container">
        <img src="https://github.com/bachttcn/Trang-web-c-a-B-ch/blob/main/Bach.png?raw=true" alt="Trịnh Toàn Bách" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=Toan+Bach&background=764ba2&color=fff'">
    </div>

    <div class="info-section">
        <h1>TRỊNH TOÀN BÁCH</h1>
        <h2>Giáo viên Trung tâm GDNN - GDTX Cầu Ngang</h2>
        <div class="tags">
            <span class="tag-item">💻 Web Designer</span>
            <span class="tag-item">🎬 Content Creator</span>
            <span class="tag-item">🚀 Yêu công nghệ</span>
        </div>
    </div>

    <div class="button-group">
        <a href="https://www.facebook.com/tbachtv3000" class="btn btn-facebook" target="_blank">
            Kết bạn Facebook
        </a>
        <a href="https://zalo.me/84945814468" class="btn btn-zalo" target="_blank">
            Kết bạn Zalo
        </a>
        <a href="https://www.tiktok.com/@trinhtoanbach" class="btn btn-tiktok" target="_blank">
            Kênh TikTok
        </a>
        <a href="mailto:tbachtv3000@gmail.com" class="btn btn-email" target="_blank">
            Gửi Email cho tôi
        </a>
        <a href="https://www.facebook.com/trungtamgdnngdtxcaungang" class="btn btn-website" target="_blank">
            Website Cơ Quan
        </a>
        
        <button id="openTool" class="btn btn-orange">
            🔥 Mở Tool Google One
        </button>
    </div>

    <div class="footer-info">
        <p><strong>MBBank:</strong> 0945814468</p>
        <p><strong>AgriBank:</strong> 0945814468</p>
        <p><strong>Chủ TK:</strong> TRỊNH TOÀN BÁCH</p>
    </div>
</div>

<!-- POPUP MODAL -->
<div id="toolPopup">
    <div class="modal-content">
        <div class="modal-header">
            <span style="font-weight: 600; letter-spacing: 0.5px;">Hệ thống Tool Google One</span>
            <button id="closeTool">&times;</button>
        </div>
        <iframe src="tool.html"></iframe>
    </div>
</div>

<script>
    const openBtn = document.getElementById("openTool");
    const closeBtn = document.getElementById("closeTool");
    const popup = document.getElementById("toolPopup");

    openBtn.onclick = () => {
        popup.style.display = "flex";
        document.body.style.overflow = "hidden";
    };

    const closeModal = () => {
        popup.style.display = "none";
        document.body.style.overflow = "auto";
    };

    closeBtn.onclick = closeModal;
    popup.onclick = (e) => { if(e.target === popup) closeModal(); };
    document.addEventListener('keydown', (e) => { if (e.key === "Escape") closeModal(); });
</script>

</body>
</html>
